  :root {
    --paper: #fbf9f4;
    --card: #fffefa;
    --ink: #4a5248;
    --ink-soft: #8a9084;
    --sage: #a8bfa8;
    --sage-deep: #7e9a80;
    --sage-wash: #e3ece1;
    --gold: #c29a5f;
    --gold-deep: #a87f44;
    --blush: #f2e0da;
  }
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Cormorant Infant", Georgia, serif;
    font-size: 17px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .page {
    max-width: 440px;
    margin: 0 auto;
    padding: 48px 22px 56px;
    position: relative;
  }
  .wash {
    position: absolute;
    border-radius: 50%;
    filter: blur(34px);
    opacity: 0.55;
    pointer-events: none;
    z-index: 0;
  }
  .wash.w1 {
    width: 320px;
    height: 280px;
    top: -60px;
    left: -120px;
    background: radial-gradient(
      closest-side,
      var(--sage-wash),
      transparent 72%
    );
  }
  .wash.w2 {
    width: 280px;
    height: 260px;
    top: 220px;
    right: -130px;
    background: radial-gradient(closest-side, var(--blush), transparent 70%);
  }
  .sheet {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid #efe9db;
    border-radius: 14px;
    box-shadow: 0 14px 34px rgba(94, 101, 88, 0.1);
    padding: 32px 24px 28px;
    text-align: center;
  }
  h1 {
    font-family: "Bad Script", cursive;
    font-size: 30px;
    font-weight: 400;
    color: var(--gold-deep);
  }
  .sub {
    font-size: 15px;
    color: var(--ink-soft);
    margin-top: 4px;
  }
  label {
    display: block;
    margin-top: 24px;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--sage-deep);
    text-align: left;
  }
  input[type="text"] {
    width: 100%;
    margin-top: 8px;
    padding: 13px 16px;
    font-family: inherit;
    font-size: 19px;
    color: var(--ink);
    background: #fdfcf8;
    border: 1px solid #e3dcc9;
    border-radius: 10px;
    outline: none;
  }
  input[type="text"]:focus {
    border-color: var(--sage-deep);
    box-shadow: 0 0 0 3px rgba(126, 154, 128, 0.18);
  }
  .preview {
    margin-top: 20px;
    padding: 16px 14px;
    background: #f8f5ec;
    border-radius: 10px;
    min-height: 56px;
  }
  .preview .greet {
    font-family: "Bad Script", cursive;
    font-size: 22px;
    color: var(--gold-deep);
  }
  .preview .hint {
    font-size: 13px;
    color: var(--ink-soft);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    width: 100%;
    margin-top: 20px;
    padding: 14px 20px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(160deg, var(--sage), var(--sage-deep));
    color: #fdfdf9;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 10px 22px rgba(126, 154, 128, 0.35);
  }
  .btn:active {
    transform: translateY(1px);
  }
  .btn:focus-visible {
    outline: 3px solid var(--gold);
    outline-offset: 3px;
  }
  .btn.alt {
    margin-top: 12px;
    background: none;
    color: var(--sage-deep);
    border: 1px solid var(--sage);
    box-shadow: none;
  }
  .linkbox {
    margin-top: 18px;
    padding: 10px 12px;
    background: #f8f5ec;
    border-radius: 8px;
    font-size: 12px;
    color: var(--ink-soft);
    word-break: break-all;
    text-align: left;
    display: none;
  }
  .toast {
    margin-top: 14px;
    font-size: 15px;
    color: var(--sage-deep);
    min-height: 22px;
  }
  .note {
    margin-top: 22px;
    font-size: 13px;
    color: var(--ink-soft);
    font-style: italic;
  }
</style>
</head>
<body>

<div class="page">
  <div class="wash w1"></div>
  <div class="wash w2"></div>
  <div class="sheet">
    <h1>Шақыру жіберу</h1>
    <p class="sub">Персональное приглашение на той Адии</p>

    <label for="guest">Имя гостя</label>
    <input
      type="text"
      id="guest"
      placeholder="Мысалы: Айгүл апай"
      autocomplete="off"
    />

    <div class="preview">
      <div class="greet" id="pvGreet">Құрметті қонақ!</div>
      <div class="hint" id="pvHint">
        Введите имя — так гость увидит обращение на сайте
      </div>
    </div>

    <button class="btn" id="shareBtn">
      <svg
        width="15"
        height="15"
        viewBox="0 0 24 24"
        fill="none"
        aria-hidden="true"
      >
        <path
          d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7M12 16V3m0 0L7 8m5-5 5 5"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      Отправить приглашение
    </button>
    <button class="btn alt" id="copyBtn">Скопировать ссылку</button>

    <div class="linkbox" id="linkBox"></div>
    <p class="toast" id="toast"></p>
    <p class="note">Ничего не сохраняется — имя гостя зашито прямо в ссылку.</p>
  </div>
</div>

<script>
  (function () {
    var BASE = "";
    var input = document.getElementById("guest");
    var pvGreet = document.getElementById("pvGreet");
    var pvHint = document.getElementById("pvHint");
    var linkBox = document.getElementById("linkBox");
    var toast = document.getElementById("toast");

    function encodeName(s) {
      return btoa(unescape(encodeURIComponent(s)))
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=+$/, "");
    }
    function baseUrl() {
      if (BASE && BASE.indexOf("__") !== 0) return BASE;
      return location.href
        .split("#")[0]
        .split("?")[0]
        .replace(/admin\.html$/, "");
    }
    function buildLink() {
      var n = input.value.trim();
      var b = baseUrl();
      return n ? b + "?q=" + encodeName(n) : b;
    }
    function refresh() {
      var n = input.value.trim();
      pvGreet.textContent = n ? "Құрметті " + n + "!" : "Құрметті қонақ!";
      pvHint.textContent = n
        ? "Так гость увидит обращение на сайте"
        : "Введите имя — так гость увидит обращение на сайте";
      linkBox.style.display = "block";
      linkBox.textContent = buildLink();
      toast.textContent = "";
    }
    input.addEventListener("input", refresh);

    function copyLink(silent) {
      var url = buildLink();
      function ok() {
        toast.textContent = "Ссылка скопирована ✓";
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(ok, function () {
          fallbackCopy(url) && ok();
        });
      } else {
        fallbackCopy(url) && ok();
      }
    }
    function fallbackCopy(text) {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      var done = false;
      try {
        done = document.execCommand("copy");
      } catch (e) {}
      document.body.removeChild(ta);
      return done;
    }

    document.getElementById("shareBtn").addEventListener("click", function () {
      var n = input.value.trim();
      var url = buildLink();
      var text =
        (n ? "Құрметті " + n + "! " : "") +
        "Сізді қызымыз Адияның бесік тойы мен тұсаукесеріне шақырамыз! 💌";
      if (navigator.share) {
        navigator
          .share({ title: "Той шақыру", text: text, url: url })
          .catch(function () {});
      } else {
        copyLink();
        toast.textContent =
          "На этом устройстве нет окна «Поделиться» — ссылка скопирована ✓";
      }
    });
    document.getElementById("copyBtn").addEventListener("click", function () {
      copyLink();
    });

    refresh();
  })();
</script>

</body>
</html>
